<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Ninja Adventure!</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="touchControls">
    <div id="touchLeft">
      <button id="btnLeft" class="touchBtn arrowBtn">&larr;</button>
      <button id="btnRight" class="touchBtn arrowBtn">&rarr;</button>
    </div>
    <div id="touchRight">
      <button id="btnAttack" class="touchBtn actionBtn">&#9733;</button>
      <button id="btnJump" class="touchBtn actionBtn">&#9650;</button>
    </div>
  </div>
  <script src="js/audio.js"></script>
  <script src="js/input.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
